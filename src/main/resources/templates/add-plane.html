<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Додати літак | Airline Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <style>
        .form-control:focus, .form-select:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        .form-control:invalid {
            border-color: #e74c3c;
            background-color: #fdf2f2;
        }

        .form-control:valid:not(:placeholder-shown) {
            border-color: #27ae60;
            background-color: #f2fdf5;
        }

        .card { border-radius: 12px; }
        .card-header { border-radius: 12px 12px 0 0 !important; }
    </style>
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-success text-white">
            <h4 class="mb-0"><i class="bi bi-plus-lg"></i> Новий борт</h4>
        </div>

        <div class="card-body">
            <div th:if="${errorMessage}" class="alert alert-danger fw-bold shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            </div>

            <form th:action="@{/add}" method="post" class="needs-validation">

                <div class="mb-3">
                    <label class="form-label fw-bold">Тип літака:</label>
                    <select name="type" id="typeSelect" class="form-select" onchange="toggleLuxuryField()" required>
                        <option value="Passenger" th:selected="${typedType == 'Passenger'}">Пасажирський</option>
                        <option value="Cargo" th:selected="${typedType == 'Cargo'}">Вантажний</option>
                        <option value="Military" th:selected="${typedType == 'Military'}">Військовий</option>
                        <option value="Private" th:selected="${typedType == 'Private'}">Приватний джет</option>
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Модель:</label>
                        <input type="text" name="model" class="form-control" th:value="${typedModel}" placeholder="Напр. Boeing 747" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Виробник:</label>
                        <input type="text" name="manufacturer" class="form-control" th:value="${typedManufacturer}" placeholder="Напр. Boeing" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Рік випуску:</label>
                        <input type="number" name="year" class="form-control" th:value="${typedYear ?: 2024}" min="1900" max="2026" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Швидкість (км/год):</label>
                        <input type="number" step="0.1" name="maxSpeed" class="form-control" th:value="${typedSpeed}" min="1" placeholder="0.0" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Дальність (км):</label>
                        <input type="number" step="0.1" name="flightRange" class="form-control" th:value="${typedRange}" min="1" placeholder="0.0" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Пальне (л/км):</label>
                        <input type="number" step="0.1" name="fuelConsumption" class="form-control" th:value="${typedFuel}" min="0.1" placeholder="0.0" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Місткість (місць/тонн):</label>
                        <input type="number" step="0.1" name="specialValue" class="form-control" th:value="${typedSpecial}" min="1" placeholder="0.0" required>
                    </div>
                    <div class="col-md-6 mb-3" id="luxuryBlock" style="display: none;">
                        <label class="form-label fw-bold">Рівень люксу:</label>
                        <input type="number" name="luxuryLevel" class="form-control" th:value="${typedLuxury ?: 5}" min="1" max="10">
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-4">
                    <a href="/" class="btn btn-outline-secondary px-4">
                        <i class="bi bi-arrow-left"></i> Назад
                    </a>
                    <button type="submit" class="btn btn-success px-5 fw-bold">
                        Створити <i class="bi bi-check2-circle"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleLuxuryField() {
        const select = document.getElementById('typeSelect');
        const luxuryBlock = document.getElementById('luxuryBlock');
        const specialInput = document.getElementsByName('specialValue')[0];

        if (select.value === 'Passenger' || select.value === 'Private') {
            specialInput.step = "1";
            if (specialInput.value) specialInput.value = Math.floor(specialInput.value);
        } else {
            specialInput.step = "0.1";
        }

        luxuryBlock.style.display = (select.value === 'Private') ? 'block' : 'none';
    }

    window.onload = toggleLuxuryField;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
