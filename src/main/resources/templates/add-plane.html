<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Додати літак</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-success text-white"><h4><i class="bi bi-plus-lg"></i> Новий борт</h4></div>
        <div class="card-body">

            <div th:if="${errorMessage}" class="alert alert-danger fw-bold shadow-sm" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${errorMessage}"></span>
            </div>

            <form action="/add" method="post">
                <div class="mb-3">
                    <label class="form-label">Тип літака</label>
                    <select name="type" id="typeSelect" class="form-select" onchange="toggleLuxuryField()">
                        <option value="Passenger" th:selected="${typedType == 'Passenger'}">Пасажирський</option>
                        <option value="Cargo" th:selected="${typedType == 'Cargo'}">Вантажний</option>
                        <option value="Military" th:selected="${typedType == 'Military'}">Військовий</option>
                        <option value="Private" th:selected="${typedType == 'Private'}">Приватний джет</option>
                    </select>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Модель</label>
                        <input type="text" name="model" class="form-control" th:value="${typedModel}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Виробник</label>
                        <input type="text" name="manufacturer" class="form-control" th:value="${typedManufacturer}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Рік</label>
                        <input type="number" name="year" class="form-control" th:value="${typedYear ?: 2024}">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Швидкість</label>
                        <input type="number" step="0.1" name="maxSpeed" class="form-control" th:value="${typedSpeed}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Дальність</label>
                        <input type="number" step="0.1" name="flightRange" class="form-control" th:value="${typedRange}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Пальне (л/км)</label>
                        <input type="number" step="0.1" name="fuelConsumption" class="form-control" th:value="${typedFuel}" required>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Місткість (місць / тонн)</label>
                        <input type="number" step="0.1" name="specialValue" class="form-control" th:value="${typedSpecial}" required>
                    </div>
                    <div class="col-md-6 mb-3" id="luxuryBlock" style="display: none;">
                        <label class="form-label">Рівень люксу</label>
                        <input type="number" name="luxuryLevel" class="form-control" th:value="${typedLuxury ?: 5}">
                    </div>
                </div>
                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-secondary">Назад</a>
                    <button type="submit" class="btn btn-success px-4">Створити</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function toggleLuxuryField() {
        const select = document.getElementById('typeSelect');
        const luxuryBlock = document.getElementById('luxuryBlock');
        const specialInput = document.getElementsByName('specialValue')[0];

        if (select.value === 'Passenger' || select.value === 'Private') {
            specialInput.step = "1";
            if (specialInput.value) specialInput.value = Math.floor(specialInput.value);
        } else {
            specialInput.step = "0.1";
        }

        luxuryBlock.style.display = (select.value === 'Private') ? 'block' : 'none';
    }

    window.onload = toggleLuxuryField;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
