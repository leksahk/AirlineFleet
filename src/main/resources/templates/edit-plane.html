<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редагування літака</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card shadow mx-auto" style="max-width: 600px;">
        <div class="card-header bg-warning text-dark">
            <h4 class="mb-0">Редагування літака: <span th:text="${plane.model}"></span></h4>
        </div>
        <div class="card-body">
            <form action="/edit" method="post">
                <input type="hidden" name="oldModelName" th:value="${plane.model}">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Назва моделі</label>
                        <input type="text" class="form-control" name="model" th:value="${plane.model}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Виробник</label>
                        <input type="text" class="form-control" name="manufacturer" th:value="${plane.manufacturer}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Рік випуску</label>
                        <input type="number" class="form-control" name="yearOfManufacture" th:value="${plane.yearOfManufacture}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Швидкість (км/год)</label>
                        <input type="number" step="0.1" class="form-control" name="maxSpeed" th:value="${plane.maxSpeed}" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Дальність (км)</label>
                        <input type="number" step="0.1" class="form-control" name="flightRange" th:value="${plane.flightRange}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Пальне (л/км)</label>
                        <input type="number" step="0.1" class="form-control" name="fuelConsumption" th:value="${plane.fuelConsumption}" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a href="/" class="btn btn-secondary">Скасувати</a>
                    <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
